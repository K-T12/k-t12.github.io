<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course: Siyan</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 50px; }
    nav a {
      margin: 0 10px;
      padding: 8px 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
      text-decoration: none;
      color: #333;
    }
    nav a:hover { background: #f0f0f0; }
    .info {
      margin-top: 40px;
      font-size: 14px;
      color: #666;
      background: #f9f9f9;
      padding: 16px;
      border-radius: 8px;
      display: inline-block;
    }
    code {
      background: #eee;
      padding: 2px 6px;
      border-radius: 4px;
    }
  </style>

  <!-- Survicate -->
  <script type="text/javascript">
    (function(opts) {
      opts.traits = { "user_id": "123" };
    })(window._sva = window._sva || {});

    (function(w) {
      var s = document.createElement('script');
      s.src = 'https://survey.survicate.com/workspaces/67811ba7dec72ebf798868f348d8fb8e/web_surveys.js';
      s.async = true;
      var e = document.getElementsByTagName('script')[0];
      e.parentNode.insertBefore(s, e);
    })(window);
  </script>
</head>
<body>

  <h1>Course: Siyan</h1>
  <p>Use the links below to switch between chat sessions (hash params):</p>

  <nav>
    <a href="#chatId=123">#chatId=123</a>
    <a href="#chatId=456">#chatId=456</a>
    <a href="#chatId=789">#chatId=789</a>
    <a href="#sessionId=123">#sessionId=123 ❌</a>
  </nav>

  <div class="info">
    <p>Current URL:<br><strong id="current-url">—</strong></p>
    <p>Hash:<br><strong id="current-hash">—</strong></p>
    <p>Test regex: <code>\/course\/.*#chatId=</code></p>
  </div>

  <script>
    function updateDisplay() {
      document.getElementById('current-url').textContent = window.location.href;
      document.getElementById('current-hash').textContent = window.location.hash || 'none';
    }
    window.addEventListener('hashchange', updateDisplay);
    document.addEventListener('DOMContentLoaded', updateDisplay);
  </script>

</body>
</html>
